name: Production quality gates

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SITE: https://www.nordsee-buesum-fewo.de
      BASE: /
      REQUIRE_INDEXABLE: 'true'
      PUBLIC_GA4_ID: G-CI00000000
      PUBLIC_GOOGLE_SITE_VERIFICATION: ci-verification-token
      PUBLIC_WEB3FORMS_ACCESS_KEY: ci-public-test-key
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high

      - name: Check Astro and TypeScript
        run: npm run check

      # Der False-Zweig des App-Feature-Flags ist ein eigener Vertrag: Der
      # normale Website-Build darf weder App-Link noch /gast-app ausliefern.
      - name: Playwright (website-only fallback)
        run: npm run test:e2e

      # PUBLIC_STAGING bleibt absichtlich ungesetzt. Der postbuild-Audit muss
      # damit eine vollständig indexierbare Produktionsausgabe bestätigen.
      # build:with-app führt zusätzlich App-Audit, Typecheck und Jest aus.
      - name: Build combined production output
        run: npm run build:with-app

      - name: Lighthouse (mobile, core pages and maps)
        run: npm run audit:lighthouse
        env:
          # `runner` steht erst auf Step-Ebene zur Verfügung; im Job-env würde
          # GitHub die gesamte Workflow-Datei bereits beim Parsen ablehnen.
          LHCI_OUTPUT_DIR: ${{ runner.temp }}/lhci-reports

      - name: Playwright (website and guest app integration)
        run: npm run test:e2e:with-app:run

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: ${{ runner.temp }}/lhci-reports
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright reports and screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-reports
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
