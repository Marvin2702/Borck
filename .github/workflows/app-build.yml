# Baut die Gäste-App in der Expo-Cloud (EAS) — manuell startbar:
# GitHub → Actions → „App Build (EAS)" → Run workflow.
# Vor der ersten Nutzung pro Plattform muss ein interaktiver lokaler Build
# erfolgreich durchlaufen. Dabei werden Signing-Credentials angelegt bzw.
# bestätigt, die der nicht-interaktive Actions-Build anschließend wiederverwendet:
#   cd app && npm ci
#   npx eas-cli@latest login
#   npx eas-cli@latest build --profile preview --platform android
# Für iOS denselben Build einmal mit --platform ios erfolgreich abschließen.
# Erst danach das Repo-Secret EXPO_TOKEN einrichten:
#   expo.dev → Account Settings → Access Tokens → „Create token"
#   → GitHub → Settings → Secrets and variables → Actions → EXPO_TOKEN
#
# Android „preview" erzeugt eine direkt installierbare APK (Link am Ende
# des Logs und auf expo.dev). Erster Android-Build erzeugt den Keystore
# automatisch. iOS braucht zusätzlich den Apple-Account (interaktive
# Erst-Einrichtung lokal: eas credentials) — bis dahin: android.
name: App Build (EAS)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Plattform'
        type: choice
        default: android
        options: [android, ios, all]
      profile:
        description: 'Build-Profil (preview = installierbare Test-APK)'
        type: choice
        default: preview
        options: [preview, production]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # secrets-Kontext ist in step-if nicht erlaubt — deshalb Shell-Check.
      - name: EXPO_TOKEN vorhanden?
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo '::error::Repo-Secret EXPO_TOKEN fehlt. expo.dev → Access Tokens → Token anlegen → GitHub-Repo-Secret EXPO_TOKEN setzen.'
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install
        run: npm ci

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high

      - name: Content-Export frisch?
        run: |
          npm run export
          changes="$(git status --porcelain --untracked-files=all -- assets/content.json src/heroImages.ts assets/images)"
          if [ -n "$changes" ]; then
            echo "$changes"
            echo '::error::App-Export veraltet — Export lokal ausführen und alle generierten Inhalte/Bilder committen.'
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Tests (preview)
        if: ${{ inputs.profile == 'preview' }}
        run: npm test -- --runInBand

      - name: Platzhalter-Check (nur production streng)
        if: ${{ inputs.profile == 'production' }}
        run: STRICT_TODOS=1 npm test -- --runInBand

      - name: EAS Build
        run: eas build --profile ${{ inputs.profile }} --platform ${{ inputs.platform }} --non-interactive
