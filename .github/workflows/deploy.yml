name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *' # täglicher Rebuild für aktuelle Smoobu-Preise

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deploy gleichzeitig; laufende nicht abbrechen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      # Ermittelt origin (https://<user>.github.io) und base_path (/<repo>)
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Check (astro check)
        run: npm run check

      # npm führt prebuild (Smoobu-Preise) und postbuild (Launch-Audit) mit aus.
      - name: Build and launch audit
        run: npm run build
        env:
          SITE: ${{ steps.pages.outputs.origin }}
          BASE: ${{ steps.pages.outputs.base_path }}
          PUBLIC_STAGING: 'true' # Staging => noindex (schützt Prod-SEO)
          PUBLIC_GA4_ID: ${{ vars.PUBLIC_GA4_ID }}
          PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ vars.PUBLIC_GOOGLE_SITE_VERIFICATION }}
          PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ vars.PUBLIC_WEB3FORMS_ACCESS_KEY }}
          SMOOBU_API_KEY: ${{ secrets.SMOOBU_API_KEY }}
          SMOOBU_API_SECRET: ${{ secrets.SMOOBU_API_SECRET }}

      # Klickbare Web-Vorschau der Gäste-App unter {base}/gast-app/ —
      # bewusst NACH dem Audit (das prüft nur die Website-Seiten).
      - name: Gäste-App Web-Vorschau
        working-directory: app
        env:
          APP_WEB_BASE: ${{ steps.pages.outputs.base_path }}/gast-app
        run: |
          npm ci
          npx expo export --platform web
          mkdir -p ../dist/gast-app && cp -r dist/. ../dist/gast-app/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
