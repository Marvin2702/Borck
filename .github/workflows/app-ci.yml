# CI der Gäste-App (app/): Typecheck + Tests + Export-Frische.
# Läuft bei App-Änderungen UND bei Änderungen an den Website-Quellen, aus
# denen die App ihren Content exportiert (Drift-Schutz).
name: App CI (Gäste-App)

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'src/content/**'
      - 'src/data/experiences.ts'
      - 'src/data/site.ts'
      - 'public/images/**'
      - '.github/workflows/app-ci.yml'
  pull_request:
    paths:
      - 'app/**'
      - 'src/content/**'
      - 'src/data/experiences.ts'
      - 'src/data/site.ts'
      - 'public/images/**'
      - '.github/workflows/app-ci.yml'

jobs:
  app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install
        run: npm ci

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high

      - name: Content-Export frisch? (Website-Quellen -> content.json)
        run: |
          npm run export
          changes="$(git status --porcelain --untracked-files=all -- assets/content.json src/heroImages.ts assets/images)"
          if [ -n "$changes" ]; then
            echo "$changes"
            echo '::error::App-Export veraltet — in app/ "npm run export" ausführen und alle generierten Inhalte/Bilder committen.'
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test
