version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      time: '04:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: '04:30'
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - '*'
