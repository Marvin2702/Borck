name: External link audit

on:
  schedule:
    - cron: '43 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: external-links
  cancel-in-progress: true

jobs:
  links:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SITE: https://www.nordsee-buesum-fewo.de
      BASE: /
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production output
        run: npm run build

      - name: Check external links
        run: npm run audit:links
